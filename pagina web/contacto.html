<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="contenedor">
        
        <div class="foto">
            <img class="fotho" src="img/abstract-sports-background-with-orange-and-red-gradient-brushstrokes-and-halftone-effect-dynamic-grunge-background-scratch-and-texture-elements-for-design-vector.webp" alt="Imagen principal de la página de contacto">
        </div>
        
        <div class="contactos">
            <div class="card">
                <h3>Teléfono</h3>
                <p>+57 300 123 4567</p>
            </div>
            
            <div class="card">
                <h3>Email</h3>
                <p>apexsport@gmail.com</p>
            </div>
            
            <div class="card">
                <h3>Dirección</h3>
                <p>Marruecos</p>
            </div>
            
            <div class="card">
                <h3>Horario</h3>
                <p>Lunes a viernes</p>
            </div>
        </div>
        
        <div class="contenido">
            <div class="texto">
                <h2>Ponerse en contacto</h2>
                <p>¿Tiene alguna consulta o algún comentario? Rellene el siguiente formulario para ponerse en contacto con nuestro equipo.</p>
                
                <input type="text" placeholder="Nombre">
                <input type="email" placeholder="Email">
                <textarea placeholder="¿Cómo podemos ayudarte?"></textarea>
                <button>ENVIAR</button>
            </div>
            
            <div class="mapa">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6973506.742289498!2d-17.222187382962034!3d31.41322818749919!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd0b88619651c58d%3A0xd9d39381c42cffc3!2sMarruecos!5e0!3m2!1ses!2sco!4v1776111825507!5m2!1ses!2sco" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
        
    </div>
    <a class="btn-inicio-footer" href="index.htm">Volver al inicio</a>
  
</body>
</html>
